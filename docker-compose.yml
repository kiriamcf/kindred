services:
  postgres:
    image: postgres:17-alpine
    container_name: kindred-postgres
    environment:
      POSTGRES_DB: kindred
      POSTGRES_USER: kindred
      POSTGRES_PASSWORD: kindred
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kindred"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kindred-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kindred.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
